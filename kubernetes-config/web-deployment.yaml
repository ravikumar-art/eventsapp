apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: events-web
  name: events-web
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: events-web
  template:
    metadata:
      labels:
        app: events-web
    spec:
      containers:
      - image: msutton01/events-website:v1.0
        imagePullPolicy: IfNotPresent
        name: events-website
        ports:
        - containerPort: 8080
        env:
        - name: SERVER
          value: "http://events-api-svc:8082"
          
